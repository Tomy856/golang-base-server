services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
      - "3000:3000"
      - "6060:6060"
    volumes:
      - .:/server
    env_file:
      - .env
    environment:
      - GO111MODULE=on
      # .bashrc の値をコンテナに引き継ぎする
      # AIapiキー: export AI_KEY=your_key を .bashrc に記載
      - GEMINI_API_KEY=${AI_KEY}
      # 社内プロキシ
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - NO_PROXY=localhost,127.0.0.1
