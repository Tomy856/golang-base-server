<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat - Bedrock Service</title>
    <script src="https://cdn.tailwindcss.org"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #1e293b; }
        .frosted { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-agent-card { border-left: 4px solid #10b981; background: rgba(16, 185, 129, 0.1); }
        #chat-area::-webkit-scrollbar { width: 6px; }
        #chat-area::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="sidebar w-72 flex flex-col border-r border-slate-700">
        <div class="p-4 border-b border-slate-700">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Agent Chat</h2>
            <button id="newChatButton" class="w-full py-3 px-4 bg-slate-100 text-slate-900 rounded-xl font-medium hover:bg-white transition-all mb-6">
                チャットを新規作成
            </button>

            <h3 class="text-xs font-semibold text-slate-500 uppercase mb-3">Active Agents</h3>
            <div id="activeAgentsList" class="space-y-2">
                <div class="active-agent-card p-3 rounded-lg flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-cyan-500 flex items-center justify-center text-white text-xs">
                        <i class="fas fa-brain"></i>
                    </div>
                    <div class="flex-1">
                        <div class="text-sm font-medium">Bedrock Agent Alpha</div>
                        <div class="text-[10px] text-emerald-400 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> Active
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-xs font-semibold text-slate-500 uppercase">Chat History</h3>
                <i class="fas fa-search text-slate-500 text-xs cursor-pointer hover:text-slate-300"></i>
            </div>
            <div id="historyList" class="space-y-1 text-sm text-slate-400">
                <div class="p-2 hover:bg-slate-800 rounded cursor-pointer truncate">Initial Onboarding Call</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="h-14 border-b border-slate-800 flex items-center px-6 justify-between">
            <div class="text-sm font-medium text-slate-300">
                Bedrock Agent Alpha <span class="text-slate-500 mx-2">|</span> <span class="text-slate-500 font-normal">動作中</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs text-slate-500">Takuya Tomita</span>
                <div class="w-8 h-8 rounded-full bg-slate-700 border border-slate-600 flex items-center justify-center text-xs">T</div>
            </div>
        </header>

        <div id="chat" class="flex-1 overflow-y-auto p-8 flex flex-col items-center">
            <div id="initialView" class="mt-32 text-center max-w-2xl">
                <div class="frosted p-8 rounded-3xl mb-6">
                    <h1 class="text-4xl font-medium mb-4 text-slate-100">何から始めますか？</h1>
                    <p class="text-slate-400">エージェントを選択して、行動を要求してください。</p>
                </div>
            </div>
            <div id="messageContainer" class="w-full max-w-3xl space-y-6 hidden"></div>
        </div>

        <div class="p-6">
            <div class="max-w-3xl mx-auto flex justify-end mb-1">
                <span id="charCount" class="text-[10px] text-slate-500">0 / 2000</span>
            </div>
            <div class="max-w-3xl mx-auto relative">
                <textarea id="message" maxlength="2000" placeholder="メッセージを入力してください"
                    class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-4 pl-6 pr-16 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 resize-none transition-all h-[60px]"></textarea>
                <button id="send" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center text-emerald-400 hover:text-emerald-300 disabled:text-slate-600 transition-colors">
                    <i id="sendIcon" class="fas fa-paper-plane text-xl"></i>
                    <div id="loadingSpinner" class="hidden animate-spin rounded-full h-5 w-5 border-2 border-emerald-400 border-t-transparent"></div>
                </button>
            </div>
            <div id="validationError" class="max-w-3xl mx-auto mt-2 text-xs text-rose-500 hidden"></div>
        </div>
    </main>

    <script src="/static/js/chat.js"></script>
</body>
</html>
