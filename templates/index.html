<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat - Bedrock Service</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #0B0E14; --sidebar: #11141B; --accent: #10b981; --text: #e2e8f0; --border: #1f2937; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* サイドバー */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; }
        .new-chat-btn { background: white; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 32px; transition: 0.2s; }
        .new-chat-btn:hover { background: #e2e8f0; }
        
        .agent-card { background: rgba(255,255,255,0.03); border: 1px solid transparent; border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; margin-bottom: 12px; transition: 0.2s; }
        .agent-card.active { border-left: 4px solid var(--accent); background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.1); }
        .icon-box { width: 36px; height: 36px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--accent); }

        /* メインコンテンツ */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { height: 56px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; font-size: 14px; background: rgba(11, 14, 20, 0.8); backdrop-filter: blur(10px); z-index: 10; }
        
        #chat { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        #chat::-webkit-scrollbar { width: 6px; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .hero { margin-top: 10vh; text-align: center; background: rgba(255,255,255,0.02); padding: 60px; border-radius: 40px; border: 1px solid var(--border); max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .hero h1 { font-size: 32px; margin-bottom: 16px; font-weight: 300; letter-spacing: -0.02em; }

        /* メッセージコンテナ */
        #messageContainer { width: 100%; max-width: 768px; }

        /* 入力エリア */
        .input-area { padding: 32px; background: linear-gradient(transparent, var(--bg) 20%); }
        .input-wrapper { max-width: 768px; margin: 0 auto; position: relative; }
        textarea { width: 100%; background: #161B22; border: 1px solid var(--border); border-radius: 20px; padding: 20px 64px 20px 24px; color: white; resize: none; height: 68px; box-sizing: border-box; font-size: 15px; outline: none; transition: all 0.2s; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4); }
        textarea:focus { border-color: rgba(16, 185, 129, 0.5); ring: 4px rgba(16, 185, 129, 0.1); }
        
        #send { position: absolute; right: 12px; top: 12px; width: 44px; height: 44px; background: var(--accent); border: none; border-radius: 14px; color: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        #send:hover { background: #34d399; transform: scale(1.05); }
        #send:disabled { background: #1f2937; color: #4b5563; cursor: not-allowed; transform: none; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--bg); border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="font-size: 10px; color: #64748b; font-weight: bold; letter-spacing: 2px; margin-bottom: 24px;">AGENT SYSTEM</div>
        <button id="newChatButton" class="new-chat-btn">新規チャット</button>
        
        <div style="font-size: 10px; color: #475569; font-weight: bold; margin-bottom: 16px;">ACTIVE AGENTS</div>
        <div id="activeAgentsList" class="space-y-3">
            <div class="agent-card active" data-agent="work">
                <div class="icon-box"><i class="fas fa-briefcase"></i></div>
                <div>
                    <div style="font-size: 14px; font-weight: bold;">Work_KB</div>
                    <div style="font-size: 10px; color: var(--accent); font-weight: 500;">Active</div>
                </div>
            </div>
            <div class="agent-card" style="opacity: 0.5;" data-agent="hobby">
                <div class="icon-box" style="color: #f97316;"><i class="fas fa-heart"></i></div>
                <div>
                    <div style="font-size: 14px; font-weight: bold;">Hobby_KB</div>
                    <div style="font-size: 10px; color: #64748b;">Standby</div>
                </div>
            </div>
        </div>

        <div style="margin-top: auto; font-size: 10px; color: #475569; font-weight: bold; margin-bottom: 16px;">HISTORY</div>
        <div id="historyList" style="font-size: 13px; color: #64748b; line-height: 2;">
            <div style="cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">技術仕様の確認</div>
        </div>
    </aside>

    <div class="main-content">
        <header>
            <div id="currentAgentDisplay">Work_KB <span style="margin: 0 12px; color: #334155;">|</span> <span style="font-size: 12px; color: #64748b;">Ready</span></div>
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 12px; color: #64748b;">Takuya Tomita</span>
                <div style="width: 32px; height: 32px; background: #1e293b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: var(--accent); border: 1px solid var(--border);">TT</div>
            </div>
        </header>

        <div id="chat">
            <div id="initialView" class="hero">
                <h1>何から始めますか？</h1>
                <p style="color: #64748b; font-size: 14px; line-height: 1.6;">エージェントを選択して指示を入力してください。<br>ナレッジベースに基づいた回答を生成します。</p>
            </div>
            <div id="messageContainer" style="display: none;"></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <div style="display: flex; justify-content: flex-end; margin-bottom: 8px; padding-right: 8px;">
                    <span id="charCount" style="font-size: 10px; color: #475569; font-family: monospace;">0 / 2000</span>
                </div>
                <textarea id="message" maxlength="2000" placeholder="Ask anything..."></textarea>
                <button id="send">
                    <i id="sendIcon" class="fas fa-arrow-up"></i>
                    <div id="loadingSpinner" class="spinner" style="display: none;"></div>
                </button>
                <div id="validationError" style="display: none; color: #ef4444; font-size: 11px; margin-top: 8px; padding-left: 12px;"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
